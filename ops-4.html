<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Versa Studios — Ops Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--near-black:#111111;--dark:#1c1c1c;--mid:#242424;--border:#333333;--muted:#aaaaaa;--white:#f4f4f4;--font:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#0d0d0f;border-bottom:1px solid rgba(216,90,97,.2);flex-shrink:0}
.top-logo img{width:80px;opacity:.85}
.top-title{font-family:var(--cond);font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(216,90,97,.9);flex:1}
.btn-p{background:var(--white);color:var(--black);border:none;border-radius:4px;padding:6px 14px;font-family:var(--cond);font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.btn-p:hover{opacity:.88}
.btn-sec{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.fi{background:var(--dark);border:1px solid var(--border);color:var(--white);font-family:var(--font);font-size:14px;padding:8px 10px;border-radius:4px;outline:none}
.fi:focus{border-color:#555}
.ops-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.ops-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:var(--near-black)}
.ops-qrow{display:flex;gap:4px;overflow-x:auto;flex:1}
.ops-qrow::-webkit-scrollbar{height:0}
.ops-qbtn{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:6px 14px;border-radius:999px;border:1px solid rgba(216,90,97,.22);background:rgba(255,255,255,.8);color:rgba(184,79,85,.8);cursor:pointer;white-space:nowrap;transition:all .15s}
.ops-qbtn:hover{background:#fff;color:#d85a61}
.ops-qbtn.active{background:#d85a61;border-color:transparent;color:#fff}
.ops-leg-row{display:flex;flex-wrap:wrap;gap:4px 12px;padding:10px 16px;border-bottom:1px solid rgba(216,90,97,.15);flex-shrink:0;background:rgba(255,251,246,.95)}
.ops-leg{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:rgba(184,79,85,.8)}
.ops-ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ops-ldiv{width:1px;height:12px;background:rgba(216,90,97,.3)}
.ops-scroll{overflow:auto;flex:1}
.ops-mhdr td{padding:9px 14px;background:#0d0d0f;border-bottom:2px solid var(--border);white-space:nowrap}
.ops-dhdr td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;width:36px;min-width:36px}
.ops-dhdr td:first-child{border-right:2px solid var(--border);width:110px;min-width:90px}
.ops-dh{padding:6px 2px 5px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:rgba(184,79,85,.7)}
.ops-dh.wk{background:rgba(216,90,97,.06);color:rgba(184,79,85,.5)}
.ops-dh .dn{display:block;font-size:13px;font-weight:900;margin-top:1px;color:#666}
.ops-dh.td .dn{color:var(--white)}
.ops-srow td{background:rgba(255,255,255,.015);border-top:2px solid var(--border);border-bottom:1px solid var(--border);padding:3px 10px;font-family:var(--cond);font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#3a3a3a}
.ops-gap td{height:3px;background:rgba(0,0,0,.5);border-top:2px solid var(--border)}
.ops-mt::after{content:'+';display:block;padding:2px 4px;color:#252525;font-size:12px;font-weight:800}
.ops-ced{position:fixed;background:var(--dark);border:1px solid rgba(255,255,255,.12);border-radius:4px;z-index:900;width:220px;box-shadow:0 8px 32px rgba(0,0,0,.9);padding:4px 0;max-height:72vh;overflow-y:auto}
.ops-cs{padding:3px 11px 2px;font-family:var(--cond);font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.ops-co{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--white)}
.ops-co:hover,.ops-co.sel{background:rgba(255,255,255,.06)}
.ops-cd{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ops-ck{margin-left:auto;color:#55b07a;font-size:11px}
.ops-div{height:1px;background:var(--border);margin:4px 0}
.ops-ci{width:calc(100% - 20px);margin:3px 10px;background:var(--near-black);border:1px solid var(--border);color:var(--white);padding:5px 7px;border-radius:3px;font-family:var(--font);font-size:12px;outline:none}
.ops-ci:focus{border-color:#555}
.ops-ca{display:block;width:calc(100% - 20px);margin:3px 10px 5px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-family:var(--cond);font-size:10px;font-weight:700;text-transform:uppercase;padding:4px;border-radius:3px;cursor:pointer;text-align:center}
.ops-ca:hover{background:rgba(255,255,255,.08);color:var(--white)}
.ops-tbl{border-collapse:collapse;table-layout:fixed;background:rgba(255,253,248,.94)}
.ops-mhdr-txt{font-size:clamp(36px,5vw,64px);font-weight:900;letter-spacing:-0.05em;line-height:.88;color:#d85a61}
.ops-dh.td .dn-wrap{background:#d85a61;color:#fff;border-radius:50%;width:26px;height:26px;line-height:26px;margin:auto;box-shadow:0 4px 10px rgba(216,90,97,.3)}
.ops-dh.td{color:#fff}
.ops-rlbl{font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;white-space:nowrap;border-right:2px solid rgba(216,90,97,.2);border-bottom:1px solid rgba(216,90,97,.12);vertical-align:middle;width:106px;min-width:106px;color:rgba(184,79,85,.8);background:rgba(255,251,246,.9)}
.ops-cell{border-right:1px solid rgba(216,90,97,.1);border-bottom:1px solid rgba(216,90,97,.1);vertical-align:top;padding:3px;width:44px;min-width:44px;cursor:pointer;background:rgba(255,253,248,.85);transition:background .12s}
.ops-cell.wk{background:rgba(216,90,97,.04)}
.ops-cell.td{background:rgba(216,90,97,.1)}
.ops-cell:hover{background:rgba(216,90,97,.08)}
.ops-chip{display:block;font-size:11px;font-weight:800;letter-spacing:.01em;padding:3px 7px;border-radius:999px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;line-height:1.3;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.ops-brk{background:rgba(216,90,97,.08);color:rgba(184,79,85,.6);border:1px solid rgba(216,90,97,.2);text-align:center;font-size:10px;border-radius:999px}
.ops-ml{color:#fff}
.ops-event{background:rgba(32,160,160,.18);color:#0a6a6a;border:1px solid rgba(32,160,160,.3)}
.ops-prod{background:rgba(200,160,32,.2);color:#7a5c08;border:1px solid rgba(200,160,32,.35)}
.ops-show{background:rgba(192,48,48,.18);color:#8b2020;border:1px solid rgba(192,48,48,.3)}
.ops-note{background:rgba(216,90,97,.08);color:#7a3a40;border:1px solid rgba(216,90,97,.2)}
.ops-mcr{background:rgba(42,110,58,.18);color:#1a4e28;border:1px solid rgba(42,110,58,.35)}
.ops-ldn{background:rgba(26,78,138,.18);color:#0f3468;border:1px solid rgba(26,78,138,.35)}
.ops-andrew{background:rgba(42,122,79,.2);color:#1a5c38;border:1px solid rgba(42,122,79,.35)}
.ops-chris{background:rgba(176,138,16,.2);color:#7a5c08;border:1px solid rgba(176,138,16,.35)}
.ops-ian{background:rgba(32,96,176,.2);color:#18407a;border:1px solid rgba(32,96,176,.35)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:800}
.modal-ov.open{display:flex}
.modal{background:var(--dark);border:1px solid var(--border);border-radius:6px;width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:var(--cond);font-size:16px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--white)}
.x-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0;line-height:1}
.x-btn:hover{color:var(--white)}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border)}
.flbl{font-family:var(--cond);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.rm-btn{background:rgba(224,85,85,.12);border:1px solid rgba(224,85,85,.25);color:#e05555;border-radius:3px;padding:3px 8px;font-size:13px;cursor:pointer}
#saveInd{position:fixed;bottom:10px;right:12px;font-size:11px;font-family:var(--cond);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3a8a55;background:rgba(42,110,58,.12);border:1px solid rgba(42,110,58,.3);border-radius:3px;padding:3px 9px;opacity:0;transition:opacity .3s;z-index:999}
#saveInd.show{opacity:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

      <div class="ops-leg"><div class="ops-ldot" style="background:#2d7dd2"></div>Morning Live</div>

      <div class="ops-leg"><div class="ops-ldot" style="background:#20a0a0"></div>Events</div>

  <div class="modal-ov" id="opsBrkModal">
    <div class="modal">
      <div class="modal-hdr"><div class="modal-title">Off Air Breaks</div><button class="x-btn" onclick="cm('opsBrkModal')">&#215;</button></div>
      <div class="modal-body">
        <div style="padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border)">
          <div class="flbl" style="margin-bottom:8px">New Break Period</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end">
            <div><div class="flbl" style="margin-bottom:3px">Name</div><input id="opsBrkName" class="fi" placeholder="e.g. Summer Break" style="width:148px"/></div>
            <div><div class="flbl" style="margin-bottom:3px">Start</div><input id="opsBrkStart" class="fi" type="date" style="width:138px"/></div>
            <div><div class="flbl" style="margin-bottom:3px">End</div><input id="opsBrkEnd" class="fi" type="date" style="width:138px"/></div>
            <button class="btn-p" onclick="opsSaveBrk()">Add</button>
          </div>
        </div>
        <div id="opsBrkList"></div>
      </div>
    </div>
  </div>
  <div class="modal-ov" id="opsEmailModal">
    <div class="modal" style="max-width:620px">
      <div class="modal-hdr"><div class="modal-title">&#9993; Morning Live Email</div><button class="x-btn" onclick="cm('opsEmailModal')">&#215;</button></div>
      <div class="modal-body">
        <div id="opsFriBanner" style="display:none;background:rgba(200,160,32,.08);border:1px solid rgba(200,160,32,.25);border-radius:3px;padding:8px 12px;margin-bottom:12px;font-size:14px;color:#d4aa30">&#128197; It's Friday — time to send next week's Morning Live schedule.</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <div class="flbl">Week starting</div>
          <input type="date" id="opsEmailWeek" class="fi" style="width:160px" onchange="opsBuildPreview()"/>
        </div>
        <div id="opsEmailPrev" style="background:#fff;border-radius:3px;overflow:hidden;margin-top:10px"></div>
      </div>

function opsIsWk(dow){const d=(dow||'').toUpperCase();return d==='SATURDAY'||d==='SUNDAY';}
function opsDStr(month,day){return(OPS_MPX[month]||'2026-03')+'-'+String(day).padStart(2,'0');}
function opsMlColor(name){if(!name)return'#2d7dd2';const k=Object.keys(OPS_ML_COLORS).find(k=>name.toLowerCase().startsWith(k.split(' ')[0].toLowerCase()));return k?OPS_ML_COLORS[k]:'#2d7dd2';}
function opsInBrk(ds){return _opsBrk.find(b=>ds>=b.start&&ds<=b.end)||null;}
function opsChip(t){var u=t.toUpperCase();if(/^\[MCR\]/.test(u))return'ops-mcr';if(/^\[LDN\]/.test(u))return'ops-ldn';if(/SHOP.?ON|DRAG.RACE|RUPAUL|DRAGON/.test(u))return'ops-show';if(/RIG|DERIG|REHEAR|CAMERA RIG/.test(u))return'ops-prod';if(/\bRX\s*\d|\bDARK\b/.test(u))return'ops-prod';if(/MEET|RECCE|EVENT/.test(u))return'ops-event';return'ops-note';}
function opsRChips(vals,fc){if(!vals.length)return'<div class="ops-mt"></div>';return vals.map(v=>{const cls=fc||opsChip(v);const s=v.length>17?v.slice(0,16)+'\u2026':v;return'<div class="ops-chip '+cls+'" title="'+v.replace(/"/g,'&quot;')+'">'+s+'</div>';}).join('');}
function opsSeedFromJobs(){
  jobs.forEach(function(j){
    if(!j.txDates||!j.studio)return;
    var stuKeys=j.studios?j.studios:[j.loc==='London'?'London':j.studio];
    j.txDates.forEach(function(td,di){
      var val=td.date;if(!val)return;
      var ds=val.split('-');if(ds.length!==3)return;
      var yr=parseInt(ds[0]),mo=parseInt(ds[1]),day=parseInt(ds[2]);
      for(var mi=0;mi<OPS_CAL.length;mi++){
        var px=OPS_MPX[OPS_CAL[mi].month];if(!px)continue;
        var parts=px.split('-').map(Number);
        if(parts[0]===yr&&parts[1]===mo){
          var locPfx=j.loc==='Manchester'?'[MCR] ':'';
          var label=locPfx+(td.label||(j.name+' RX '+(di+1)));
          stuKeys.forEach(function(sk){
            var row='st_'+sk;
            var cur=og(OPS_CAL[mi].month,day,row).slice();
            if(!cur.includes(label)){cur.push(label);os(OPS_CAL[mi].month,day,row,cur);}
            if(!_opsStu.has(sk))_opsStu.add(sk);
          });
          // Morning Live: write tech manager name to ml row as plain string
          if(j.name==='Morning Live'&&td.crew&&td.crew['Tech Manager']){
            var tm=td.crew['Tech Manager'];
            var mlCur=og(OPS_CAL[mi].month,day,'ml').slice();
            if(!mlCur.includes(tm)){mlCur=[tm];os(OPS_CAL[mi].month,day,'ml',mlCur);}
          }
          break;
        }
      }
    });
  });
}
function opsMlSpans(month,days){
  const spans=[],cov=new Set();let i=0;
  while(i<days.length){
    const d=days[i];const ds=opsDStr(month,d.day);
    const brk=opsInBrk(ds);
    if(brk){
      let j=i+1;
      while(j<days.length&&opsInBrk(opsDStr(month,days[j].day))===brk)j++;
      const ei=j-1;
      spans.push({si:i,ei,label:brk.name,isBreak:true});
      for(let k=i+1;k<=ei;k++)cov.add(k);
      i=j;continue;
    }
    // Skip weekends — they render as their own cells, never start/continue a span
    if(opsIsWk(d.dow)){i++;continue;}
    const v=og(month,d.day,'ml');
    if(v.length&&v[0]!=='Break / Off Air'){
      const person=v[0];let j=i+1;let crossedWknd=false;
      while(j<days.length){
        const nd=days[j];
        if(opsInBrk(opsDStr(month,nd.day)))break;
        // Weekend days: track that we've crossed into a new week
        if(opsIsWk(nd.dow)){crossedWknd=true;j++;continue;}
        // Always break at Monday — never span across week boundaries
        if(nd.dow.toUpperCase()==='MONDAY')break;
        const nv=og(month,nd.day,'ml');
        if(nv.length&&nv[0]===person)j++;
        else break;
      }
      let ei=j-1;
      while(ei>i&&opsIsWk(days[ei].dow))ei--;
      spans.push({si:i,ei,label:person,isBreak:false});
      for(let k=i+1;k<=ei;k++)cov.add(k);
      i=ei+1;
    }else i++;
  }
  return{spans,cov};
}

function opsRenderMonth(m,mi){
  const days=m.days;const n=days.length;if(!n)return'';
  // Auto-seed Sat/Sun as Break/Off Air for Morning Live
  days.forEach(function(d){
    if(opsIsWk(d.dow)){
      var cur=og(m.month,d.day,'ml');
      if(!cur.length||cur[0]==='Break / Off Air')
        os(m.month,d.day,'ml',['Break / Off Air']);
    }
  });
  const{spans,cov}=opsMlSpans(m.month,days);
  const spMap={};spans.forEach(sp=>spMap[sp.si]=sp);
  let h='<table class="ops-tbl">';
  h+='<tr class="ops-mhdr"><td colspan="'+(n+1)+'"><div style="display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;"><span class="ops-mhdr-txt">'+m.month.split(' ')[0].toUpperCase()+'</span><span style="font-size:18px;font-weight:800;letter-spacing:.04em;color:rgba(216,90,97,.7);padding-bottom:8px;">'+m.month.split(' ')[1]+'</span></div></td></tr>';
  h+='<tr class="ops-dhdr"><td class="ops-rlbl" style="border-bottom:1px solid var(--border)"></td>';
  days.forEach(d=>{const wk=opsIsWk(d.dow);const td=opsDStr(m.month,d.day)===OPS_TODAY;h+='<td><div class="ops-dh'+(wk?' wk':'')+(td?' td':'')+'"><span style="font-size:9px;display:block;margin-bottom:3px;">'+d.dow.slice(0,1)+'</span><div class="dn-wrap" style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:13px;font-weight:900;background:'+(td?'#d85a61':'rgba(216,90,97,.1)')+';color:'+(td?'#fff':'rgba(184,79,85,.8)')+';'+(td?'box-shadow:0 4px 10px rgba(216,90,97,.28);':'')+'">'+d.day+'</div></div></td>';});
  h+='</tr>';
  const cell=(idx,row,fc)=>{
    const d=days[idx];const wk=opsIsWk(d.dow);const td=opsDStr(m.month,d.day)===OPS_TODAY;
    const vals=og(m.month,d.day,row);
    const rid=('oc_'+mi+'_'+d.day+'_'+row).replace(/[^a-zA-Z0-9_]/g,'_');
    const cls='ops-cell'+(wk?' wk':'')+(td?' td':'');
    if(row==='ml'){
      if(cov.has(idx))return null;
      const sp=spMap[idx];const cs=sp?(sp.ei-sp.si+1):1;
      const person=vals.length?vals[0]:'';
      let chip;
      if(sp&&sp.isBreak)chip='<div class="ops-chip ops-brk">'+sp.label+'</div>';
      else if(!person)chip='<div class="ops-mt"></div>';
      else if(person==='Break / Off Air')chip='<div class="ops-chip ops-brk">Break</div>';
      else chip='<div class="ops-chip ops-ml" style="background:'+opsMlColor(person)+'">'+person.split(' ')[0]+'</div>';
      return'<td class="'+cls+'" colspan="'+cs+'" id="'+rid+'" data-mi="'+mi+'" data-day="'+d.day+'" data-row="ml" onclick="opsCk(this)">'+chip+'</td>';
    }
    return'<td class="'+cls+'" id="'+rid+'" data-mi="'+mi+'" data-day="'+d.day+'" data-row="'+row+'" onclick="opsCk(this)">'+opsRChips(vals,fc)+'</td>';
  };
  const srow=lbl=>'<tr class="ops-srow"><td colspan="'+(n+1)+'">'+lbl+'</td></tr>';
  const gap='<tr class="ops-gap"><td colspan="'+(n+1)+'"></td></tr>';
  const brow=(lbl,row,color,fc)=>{let r='<tr><td class="ops-rlbl" style="color:'+color+'">'+lbl+'</td>';days.forEach((_,i)=>{const c=cell(i,row,fc);if(c)r+=c;});return r+'</tr>';};
  h+=srow('Morning Live');
  h+=brow('Morning Live','ml','#2d7dd2',null);
  h+=srow('Meetings / Events');
  h+=brow('Events','events','#20a0a0','ops-event');
  // Studio location map — hardcoded base + job overrides
  var stuLocMap=Object.assign({},OPS_STU_LOC);
  jobs.forEach(function(jj){
    if(jj.studio&&jj.loc){
      stuLocMap[jj.studio]=jj.loc;
      if(jj.loc==='London')stuLocMap['London']='London';
    }
  });


  const stus=OPS_STUDIOS;
  stus.forEach(function(st){
    if(_opsHidStu.has(st))return;
    var loc=stuLocMap[st]||'';
    var lCol=loc==='Manchester'?'#2a6e3a':loc==='London'?'#1a4e8a':'rgba(154,112,48,.9)';
    var lBg=loc==='Manchester'?'rgba(42,110,58,.08)':loc==='London'?'rgba(26,78,138,.08)':'rgba(255,251,246,.9)';
    var locBadge=loc==='Manchester'?'<span style="font-size:8px;font-weight:900;background:rgba(42,110,58,.15);color:#2a6e3a;border-radius:999px;padding:1px 5px;margin-left:4px;border:1px solid rgba(42,110,58,.25);">MCR</span>':loc==='London'?'<span style="font-size:8px;font-weight:900;background:rgba(26,78,138,.15);color:#1a4e8a;border-radius:999px;padding:1px 5px;margin-left:4px;border:1px solid rgba(26,78,138,.25);">LDN</span>':'';
    let r='<tr><td class="ops-rlbl" style="color:'+lCol+';background:'+lBg+'">'+st+locBadge+'</td>';
    days.forEach(function(d,idx){
      const row='st_'+st;const wk=opsIsWk(d.dow);const td=opsDStr(m.month,d.day)===OPS_TODAY;
      const vals=og(m.month,d.day,row);
      const rid=('oc_'+mi+'_'+d.day+'_'+row).replace(/[^a-zA-Z0-9_]/g,'_');
      r+='<td class="ops-cell'+(wk?' wk':'')+(td?' td':'')+'" id="'+rid+'" data-mi="'+mi+'" data-day="'+d.day+'" data-row="'+row+'" onclick="opsCk(this)">'+opsRChips(vals,null)+'</td>';
    });
    r+='</tr>';h+=r;
  });
  h+=gap;
  h+=brow('Andrew','andrew','#3a8a55','ops-andrew');
  h+=gap;
  h+=brow('Chris','chris','#907010','ops-chris');
  h+=gap;
  h+=brow('Ian','ian','#3a5aaa','ops-ian');
  h+='</table>';
  return h;
}

  var secs=document.querySelectorAll('#opsBody .ops-ms');
  secs.forEach(function(sec,i){
    if(sec.style.display!=='none') sec.innerHTML=opsRenderMonth(OPS_CAL[i],i);
  });
}
function opsReRenderAll(){
  opsSeedFromJobs();
  var secs=document.querySelectorAll('#opsBody .ops-ms');
  secs.forEach(function(sec,i){
    if(sec.style.display!=='none') sec.innerHTML=opsRenderMonth(OPS_CAL[i],i);
  });
}

let _opsEd=null;
function opsCk(td){
  const mi=+td.dataset.mi,day=+td.dataset.day,row=td.dataset.row;
  // Block editing weekend ML cells
  if(row==='ml'){const m=OPS_CAL[mi];if(m){const d=m.days.find(function(x){return x.day===day;});if(d&&opsIsWk(d.dow))return;}}
  const month=OPS_CAL[mi].month;
  _opsEd={mi,day,row,id:td.id,month};
  const cur=og(month,day,row);
  const mkO=(val,col,single)=>{const sel=cur.includes(val);return'<div class="ops-co'+(sel?' sel':'')+'" data-v="'+val.replace(/"/g,'&quot;')+'" data-s="'+(single?1:0)+'" onclick="opsOpt(this)"><div class="ops-cd" style="background:'+col+'"></div>'+val.replace(/&/g,'&amp;')+(sel?'<span class="ops-ck">✓</span>':'')+'</div>';};
  let html='';
  if(row==='ml'){html+='<div class="ops-cs">Tech Manager</div>';OPS_TM.forEach(tm=>html+=mkO(tm,opsMlColor(tm),true));html+='<div class="ops-div"></div><div class="ops-cs">Off Air</div>';html+=mkO('Break / Off Air','#333',true);}
  else if(row==='events'){html+='<div class="ops-cs">Events</div>';}
  else if(row.startsWith('st_')){const stName=row.slice(3);html+='<div class="ops-cs">'+stName+'</div>';}
  else{const colMap={andrew:'#3a8a55',chris:'#907010',ian:'#3a5aaa'};const col=colMap[row]||'#555';html+='<div class="ops-cs">'+row.charAt(0).toUpperCase()+row.slice(1)+'</div>';html+=mkO('Day Off',col,false);html+='<div class="ops-div"></div><div class="ops-cs">Jobs</div>';jobs.filter(function(j){return j.status!=='Cancelled';}).forEach(function(j){html+=mkO(j.name,col,false);});}
  html+='<div class="ops-div"></div><input class="ops-ci" id="opsCiTxt" placeholder="Custom..." onkeydown="if(event.keyCode===13)opsCiAdd()"/><button class="ops-ca" onclick="opsCiAdd()">+ Add Custom</button>';
  if(cur.length)html+='<div class="ops-div"></div><div class="ops-co" onclick="opsClear()" style="color:#c06060"><div class="ops-cd" style="background:#c06060"></div>Clear cell</div>';
  const ced=document.getElementById('opsCed');
  document.getElementById('opsCedIn').innerHTML=html;
  const rect=td.getBoundingClientRect();
  var vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  var vw=window.visualViewport?window.visualViewport.width:window.innerWidth;
  var vtop=window.visualViewport?(window.visualViewport.offsetTop||0):0;
  ced.style.top=Math.min(rect.bottom+3,vtop+vh-270)+'px';
  ced.style.left=Math.max(4,Math.min(rect.left,vw-234))+'px';
  ced.style.display='block';
  setTimeout(()=>{const i=document.getElementById('opsCiTxt');if(i)i.focus();},25);
}
function opsOpt(el){if(!_opsEd)return;const val=el.dataset.v;const single=el.dataset.s==='1';const{month,day,row,id}=_opsEd;let cur=og(month,day,row).slice();if(single)cur=cur.includes(val)?[]:[val];else{if(cur.includes(val))cur=cur.filter(x=>x!==val);else cur.push(val);}os(month,day,row,cur);if(row==='ml'){const ML_SYNC={andrew:'Andrew',ian:'Ian'};Object.keys(ML_SYNC).forEach(function(rk){var nm=ML_SYNC[rk];var ex=og(month,day,rk).slice();if(cur.length&&cur[0]&&cur[0].toLowerCase().startsWith(nm.toLowerCase())){if(!ex.includes('Morning Live'))ex=['Morning Live'];os(month,day,rk,ex);}else{var cl=ex.filter(function(x){return x!=='Morning Live';});if(cl.length!==ex.length)os(month,day,rk,cl);}});opsReRender();}else{opsRefCell(id,month,day,row);opsCk(document.getElementById(id));}}
function opsCiAdd(){const inp=document.getElementById('opsCiTxt');if(!inp||!inp.value.trim())return;const val=inp.value.trim();const{month,day,row,id}=_opsEd;const cur=og(month,day,row).slice();if(!cur.includes(val)){cur.push(val);os(month,day,row,cur);}inp.value='';opsRefCell(id,month,day,row);opsCk(document.getElementById(id));}
function opsClear(){if(!_opsEd)return;const{month,day,row,id}=_opsEd;os(month,day,row,[]);opsRefCell(id,month,day,row);opsCloseCed();}
function opsCloseCed(){document.getElementById('opsCed').style.display='none';_opsEd=null;}
function opsRefCell(id,month,day,row){const el=document.getElementById(id);if(!el)return;const vals=og(month,day,row);const fc={andrew:'ops-andrew',chris:'ops-chris',ian:'ops-ian'}[row]||null;if(row==='ml'){if(!vals.length)el.innerHTML='<div class="ops-mt"></div>';else if(vals[0]==='Break / Off Air')el.innerHTML='<div class="ops-chip ops-brk">Break</div>';else el.innerHTML='<div class="ops-chip ops-ml" style="background:'+opsMlColor(vals[0])+'">'+vals[0].split(' ')[0]+'</div>';}else el.innerHTML=opsRChips(vals,fc);}
function opsRxNum(mi,currentDay,row){const m=OPS_CAL[mi];if(!m)return 1;let n=0;m.days.forEach(d=>{if(d.day<currentDay)og(m.month,d.day,row).forEach(v=>{if(/^RX\s*\d+$/i.test(v.trim()))n++;});});return n+1;}
document.addEventListener('click',e=>{const ced=document.getElementById('opsCed');if(ced&&ced.style.display==='block'&&!ced.contains(e.target)&&!e.target.closest('.ops-cell'))opsCloseCed();});

// Break manager
function setPlannerView(v){
  plannerView=v;calView=v;
  ['planVW','planVM','planVY'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.remove('active');
  });
  var btn=document.getElementById(v==='week'?'planVW':v==='year'?'planVY':'planVM');
  if(btn)btn.classList.add('active');
  if(v==='week'&&!calWeekStart){
    var now=new Date();var dow=now.getDay();var diff=dow===0?-6:1-dow;
    calWeekStart=new Date(now);calWeekStart.setDate(now.getDate()+diff);
  }
  // Re-render whichever planner is currently visible
  if(_planView==='cal') renderCal();
  else if(_planView==='ops') opsReRenderAll();
  else if(_planView==='fl') renderFreelancePlanner();
}
function opsSaveBrk(){const name=document.getElementById('opsBrkName').value.trim();const start=document.getElementById('opsBrkStart').value;const end=document.getElementById('opsBrkEnd').value;if(!name||!start||!end){alert('Name, start and end required');return;}if(end<start){alert('End must be after start');return;}_opsBrk.push({id:Date.now(),name,start,end});document.getElementById('opsBrkName').value='';document.getElementById('opsBrkStart').value='';document.getElementById('opsBrkEnd').value='';opsRenderBrkList();opsRenderAll();saveData();}
function opsRmBrk(i){_opsBrk.splice(i,1);opsRenderBrkList();opsRenderAll();saveData();}
function opsRenderBrkList(){const el=document.getElementById('opsBrkList');if(!el)return;el.innerHTML=!_opsBrk.length?'<div style="color:#888;font-size:14px;padding:4px 0">No breaks set.</div>':_opsBrk.map((b,i)=>'<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-family:var(--cond);font-size:14px;font-weight:700;color:var(--white)">'+b.name+'</div><div style="font-size:13px;color:#888;margin-top:2px">'+b.start+' – '+b.end+'</div></div><button onclick="opsRmBrk('+i+')" class="rm-btn">×</button></div>').join('');}
document.addEventListener('click',e=>{const ced=document.getElementById('opsCed');if(ced&&ced.style.display==='block'&&!ced.contains(e.target)&&!e.target.closest('.ops-cell')){ced.style.display='none';_opsEd=null;}});
function opsOpenEmail(){if(new Date().getDay()===5)document.getElementById('opsFriBanner').style.display='block';const d=new Date();const diff=d.getDay()===0?1:(8-d.getDay());d.setDate(d.getDate()+diff);document.getElementById('opsEmailWeek').value=d.toISOString().split('T')[0];opsBuildPreview();om('opsEmailModal');}
function opsWeekData(){const ws=document.getElementById('opsEmailWeek').value;if(!ws)return[];const mon=new Date(ws);const names=['Monday','Tuesday','Wednesday','Thursday','Friday'];const res=[];for(let i=0;i<5;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const ds=d.toISOString().split('T')[0];const[yr,mo,day]=ds.split('-').map(Number);let tech='TBC';for(const m of OPS_CAL){const px=OPS_MPX[m.month];if(!px)continue;const[py,pm]=px.split('-').map(Number);if(py===yr&&pm===mo){const v=og(m.month,day,'ml');if(v.length&&v[0]!=='Break / Off Air')tech=v[0];break;}}res.push({name:names[i],date:d.toLocaleDateString('en-GB',{day:'numeric',month:'long'}),tech});}return res;}
function opsBuildPreview(){const ws=document.getElementById('opsEmailWeek').value;if(!ws)return;const mon=new Date(ws);const wl=mon.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+' – '+new Date(mon.getTime()+4*86400000).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});const rows=opsWeekData().map(d=>'<tr><td style="padding:10px 15px;border-bottom:1px solid #eee;font-weight:600;color:#222">'+d.name+' '+d.date+'</td><td style="padding:10px 15px;border-bottom:1px solid #eee;color:#2d7dd2;font-weight:700">'+d.tech+'</td></tr>').join('');document.getElementById('opsEmailPrev').innerHTML='<div style="font-family:Arial,sans-serif"><div style="background:#0a0a0a;padding:14px 18px"><div style="color:#fff;font-size:15px;font-weight:900;letter-spacing:.08em;text-transform:uppercase">VERSA STUDIOS</div></div><table style="width:100%;border-collapse:collapse"><tbody>'+rows+'</tbody></table></div>';}
function opsCopyEmail(){const wd=opsWeekData();const ws=document.getElementById('opsEmailWeek').value;const mon=new Date(ws);const wl=mon.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+' to '+new Date(mon.getTime()+4*86400000).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});let body='Morning Live Tech Schedule\nWeek of '+wl+'\n\n';wd.forEach(d=>{body+=d.name+' '+d.date+': '+d.tech+'\n';});navigator.clipboard.writeText(body+'\nVersa Studios Tech Ops').then(()=>alert('Copied'));}
function opsMailto(){const wd=opsWeekData();const ws=document.getElementById('opsEmailWeek').value;const wl=new Date(ws).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});let body='Morning Live Tech Schedule\nWeek commencing '+wl+'\n\n';wd.forEach(d=>{body+=d.name+' '+d.date+': '+d.tech+'\n';});window.location.href='mailto:?subject='+encodeURIComponent('Morning Live Tech Schedule - w/c '+wl)+'&body='+encodeURIComponent(body+'\nVersa Studios Tech Ops');}
function opsRenderNav(){var nav=document.getElementById('opsQnav');if(!nav)return;nav.innerHTML=OPS_CAL.map(function(m,i){return'<button class="ops-qbtn" onclick="opsJumpMonth('+i+')">'+m.month.split(' ')[0].slice(0,3).toUpperCase()+'</button>';}).join('');}
function opsJumpMonth(i){var secs=document.querySelectorAll('#opsBody .ops-ms');if(secs[i])secs[i].scrollIntoView({behavior:'smooth',block:'start'});}
function opsRenderAll(){opsSeedFromJobs();var body=document.getElementById('opsBody');body.innerHTML=OPS_CAL.map(function(m,i){return'<div class="ops-ms" style="margin-bottom:32px">'+opsRenderMonth(m,i)+'</div>';}).join('');}
async function _silentLogin(email, pass){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(_SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':_SB_KEY},
      body:JSON.stringify({email,password:pass}),signal:ctrl.signal
    });
    clearTimeout(timer);
    const d=await r.json();
    if(d.access_token){
      _authToken=d.access_token;
      localStorage.setItem('_vsToken',_authToken);
      return true;
    }
  }catch(e){}
  return false;
}

function _showLoginPrompt(){
  const ov=document.createElement('div');
  ov.id='_opsLoginOv';
  ov.style.cssText='position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999';
  ov.innerHTML='<div style="background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:32px;width:320px;display:flex;flex-direction:column;gap:12px">'
    +'<div style="font-family:var(--cond);font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--white);text-align:center;margin-bottom:4px">Versa Studios</div>'
    +'<input id="_opEmail" class="fi" type="email" placeholder="Email" autocomplete="email"/>'
    +'<input id="_opPass" class="fi" type="password" placeholder="Password" onkeydown="if(event.key===String.fromCharCode(13))_doOpsLogin()"/>'
    +'<button id="_opBtn" class="btn-p" style="width:100%" onclick="_doOpsLogin()">Sign In</button>'
    +'<div id="_opErr" style="color:#e05555;font-size:13px;text-align:center;display:none"></div>'
    +'</div>';
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('_opEmail').focus(),50);
}

async function _doOpsLogin(){
  const email=document.getElementById('_opEmail').value.trim();
  const pass=document.getElementById('_opPass').value;
  const err=document.getElementById('_opErr');
  const btn=document.getElementById('_opBtn');
  err.style.display='none';
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  const ok=await _silentLogin(email,pass);
  if(ok){
    const ov=document.getElementById('_opsLoginOv');
    if(ov)ov.remove();
    _startApp();
  } else {
    err.textContent='Sign in failed — check email and password';
    err.style.display='block';
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
  }
}

async function _startApp(){
  try{
    await loadData();
    opsRenderNav();
    opsRenderAll();
    opsRenderBrkList();
    setTimeout(function(){OPS_CAL.forEach(function(m,i){var px=OPS_MPX[m.month];if(!px)return;if(OPS_TODAY.startsWith(px)){opsJumpMonth(i);}});},200);
  }catch(e){
    console.error('Ops startApp error:',e);
    document.getElementById('opsBody').innerHTML='<div style="padding:20px;color:#e05555">Error loading planner. Please refresh.</div>';
  }
}

window.addEventListener('DOMContentLoaded',async function(){
  if(_authToken){
    // Try loading with existing token (12s timeout)
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),12000);
      const test=await fetch(_SB_URL+'/rest/v1/app_data?select=key&limit=1',{headers:_sbH(),signal:ctrl.signal});
      clearTimeout(timer);
      if(test.ok){_startApp();return;}
    }catch(e){}
  }
  // Token missing or expired — show login
  _showLoginPrompt();
});
</script>
